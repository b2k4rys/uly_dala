# Launch the whole stack:  docker compose up --build
# Then open:  http://localhost:8080   (API + admin proxied under /api and /admin)
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: uly
      POSTGRES_PASSWORD: uly
      POSTGRES_DB: uly
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uly -d uly"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      SECRET_KEY: dev-secret-change-me
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      DATABASE_URL: postgres://uly:uly@db:5432/uly
      CORS_ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
